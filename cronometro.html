<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometro - Gym Hub</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 viewBox%3D%220 0 64 64%22%3E%3Crect width%3D%2264%22 height%3D%2264%22 rx%3D%2210%22 fill%3D%22%230a0a0a%22%2F%3E%3Crect x%3D%2218%22 y%3D%2230%22 width%3D%2228%22 height%3D%224%22 rx%3D%222%22 fill%3D%22%23e63946%22%2F%3E%3Crect x%3D%225%22 y%3D%2222%22 width%3D%228%22 height%3D%2220%22 rx%3D%223%22 fill%3D%22%23e63946%22%2F%3E%3Crect x%3D%2213%22 y%3D%2226%22 width%3D%225%22 height%3D%2212%22 rx%3D%222%22 fill%3D%22%23e63946%22%2F%3E%3Crect x%3D%2246%22 y%3D%2226%22 width%3D%225%22 height%3D%2212%22 rx%3D%222%22 fill%3D%22%23e63946%22%2F%3E%3Crect x%3D%2251%22 y%3D%2222%22 width%3D%228%22 height%3D%2220%22 rx%3D%223%22 fill%3D%22%23e63946%22%2F%3E%3C%2Fsvg%3E">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Contenitore centrale della pagina */
        .crono-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 20px 0 60px;
        }

        /* Box cronometro e timer */
        .crono-box {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .crono-box h2 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Display numerico grande */
        .crono-display {
            font-size: 4.5rem;
            font-weight: 700;
            color: #e63946;
            letter-spacing: 4px;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums;
        }

        /* Pulsanti azione */
        .crono-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-crono {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start  { background: #e63946; color: #fff; }
        .btn-start:hover  { background: #c0303c; }

        .btn-stop   { background: #333; color: #fff; }
        .btn-stop:hover   { background: #444; }

        .btn-reset  { background: #111; color: #555; border: 1px solid #222; }
        .btn-reset:hover  { color: #aaa; border-color: #444; }

        /* Sezione impostazione timer riposo */
        .timer-input-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .timer-input-row label {
            color: #666;
            font-size: 0.85rem;
        }

        .timer-input-row input {
            width: 70px;
            padding: 8px 10px;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }

        /* Messaggio di fine timer */
        .timer-alert {
            display: none;
            background: #e63946;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-row">
        <h1>Cronometro</h1>
    </div>
    <p>Misura i tempi di lavoro e di riposo</p>
</header>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="video.html">Video</a></li>
        <li><a href="schede.html">Schede</a></li>
        <li><a href="cronometro.html" class="active">Cronometro</a></li>
    </ul>
</nav>

<main>
    <div class="crono-wrapper">

        <!-- ==============================
             CRONOMETRO
        ============================== -->
        <div class="crono-box">
            <h2>Cronometro</h2>

            <!-- Il testo viene aggiornato da JavaScript -->
            <div class="crono-display" id="cronoDisplay">00:00</div>

            <div class="crono-buttons">
                <button class="btn-crono btn-start" onclick="cronoStart()">Avvia</button>
                <button class="btn-crono btn-stop"  onclick="cronoStop()">Stop</button>
                <button class="btn-crono btn-reset" onclick="cronoReset()">Reset</button>
            </div>
        </div>


        <!-- ==============================
             TIMER RIPOSO
        ============================== -->
        <div class="crono-box">
            <h2>Timer Riposo</h2>

            <!-- Avviso visivo quando il tempo scade -->
            <div class="timer-alert" id="timerAlert">⏰ Tempo scaduto!</div>

            <div class="timer-input-row">
                <label for="timerMinuti">Minuti</label>
                <input type="number" id="timerMinuti" value="2" min="0" max="59">
                <label for="timerSecondi">Secondi</label>
                <input type="number" id="timerSecondi" value="0" min="0" max="59">
            </div>

            <div class="crono-display" id="timerDisplay">02:00</div>

            <div class="crono-buttons">
                <button class="btn-crono btn-start" onclick="timerStart()">Avvia</button>
                <button class="btn-crono btn-stop"  onclick="timerStop()">Stop</button>
                <button class="btn-crono btn-reset" onclick="timerReset()">Reset</button>
            </div>
        </div>

    </div>
</main>

<footer>
    <p>Gym Hub</p>
</footer>

<script>

    /* ==============================
       CRONOMETRO
       Conta i secondi dall'avvio.
       setInterval chiama una funzione ogni N millisecondi.
    ============================== */
    var cronoSeconds  = 0;   /* secondi totali trascorsi */
    var cronoInterval = null; /* ID dell'intervallo attivo (null = fermo) */

    function cronoStart() {
        /* Evita di avviare più intervalli contemporaneamente */
        if (cronoInterval !== null) return;

        cronoInterval = setInterval(function() {
            cronoSeconds++;
            cronoDisplay.textContent = formatTime(cronoSeconds);
        }, 1000);
    }

    function cronoStop() {
        clearInterval(cronoInterval);
        cronoInterval = null;
    }

    function cronoReset() {
        cronoStop();
        cronoSeconds = 0;
        document.getElementById('cronoDisplay').textContent = '00:00';
    }


    /* ==============================
       TIMER RIPOSO
       Conta alla rovescia dal valore impostato.
    ============================== */
    var timerSeconds  = 0;    /* secondi rimanenti */
    var timerInterval = null;

    function timerStart() {
        /* Evita di avviare più intervalli contemporaneamente */
        if (timerInterval !== null) return;

        /* Legge i valori dai campi input al momento dell'avvio */
        var min = parseInt(document.getElementById('timerMinuti').value)  || 0;
        var sec = parseInt(document.getElementById('timerSecondi').value) || 0;

        /* Usa il valore corrente solo se il timer non era già partito */
        if (timerSeconds === 0) {
            timerSeconds = (min * 60) + sec;
        }

        /* Nasconde eventuale avviso precedente */
        document.getElementById('timerAlert').style.display = 'none';

        timerInterval = setInterval(function() {
            timerSeconds--;
            document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);

            if (timerSeconds <= 0) {
                /* Il timer è scaduto: ferma l'intervallo e mostra l'avviso */
                clearInterval(timerInterval);
                timerInterval = null;
                timerSeconds  = 0;
                document.getElementById('timerAlert').style.display = 'block';
            }
        }, 1000);
    }

    function timerStop() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function timerReset() {
        timerStop();
        timerSeconds = 0;
        document.getElementById('timerAlert').style.display = 'none';

        /* Torna al valore impostato nei campi */
        var min = parseInt(document.getElementById('timerMinuti').value)  || 0;
        var sec = parseInt(document.getElementById('timerSecondi').value) || 0;
        document.getElementById('timerDisplay').textContent = formatTime((min * 60) + sec);
    }


    /* ==============================
       UTILITY
       Converte secondi totali in MM:SS
    ============================== */
    function formatTime(totalSeconds) {
        var m = Math.floor(totalSeconds / 60);
        var s = totalSeconds % 60;
        /* padStart aggiunge uno zero davanti se il numero ha una sola cifra */
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

</script>

</body>
</html>
